<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003E8A"/>
      <stop offset="100%" style="stop-color:#002048"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C87A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Open book — left page -->
  <path d="M 96 168 C 150 150 200 158 256 188 L 256 392 C 200 362 150 354 96 372 Z" fill="#F5EDD8"/>
  <!-- Open book — right page -->
  <path d="M 416 168 C 362 150 312 158 256 188 L 256 392 C 312 362 362 354 416 372 Z" fill="#F5EDD8"/>

  <!-- Page lines — left -->
  <path d="M 122 210 C 165 198 205 204 240 222" fill="none" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <path d="M 122 246 C 165 234 205 240 240 258" fill="none" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M 122 282 C 165 270 205 276 240 294" fill="none" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.45"/>

  <!-- Page lines — right -->
  <path d="M 390 210 C 347 198 307 204 272 222" fill="none" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <path d="M 390 246 C 347 234 307 240 272 258" fill="none" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M 390 282 C 347 270 307 276 272 294" fill="none" stroke="#C9A84C" stroke-width="6" stroke-linecap="round" opacity="0.45"/>

  <!-- Book spine -->
  <rect x="250" y="180" width="12" height="206" rx="4" fill="url(#gold)"/>

  <!-- Star above the book -->
  <g transform="translate(256,108)">
    <polygon points="0,-30 9,-9 32,-9 13,5 20,28 0,14 -20,28 -13,5 -32,-9 -9,-9"
      fill="url(#gold)"/>
  </g>

  <!-- Stars row at bottom -->
  <circle cx="146" cy="448" r="9" fill="#E8C87A" opacity="0.9"/>
  <circle cx="196" cy="448" r="9" fill="#E8C87A" opacity="0.9"/>
  <circle cx="256" cy="448" r="11" fill="#F0D278"/>
  <circle cx="316" cy="448" r="9" fill="#E8C87A" opacity="0.9"/>
  <circle cx="366" cy="448" r="9" fill="#E8C87A" opacity="0.9"/>
</svg>
